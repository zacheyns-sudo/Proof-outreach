<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof — LP Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1e242c;
  --bg4:      #262e38;
  --green:    #10b981;
  --green-d:  #065f46;
  --white:    #e6edf3;
  --slate:    #484f58;
  --slate-l:  #6e7681;
  --slate-ll: #8b949e;
  --blue:     #58a6ff;
  --amber:    #f0a500;
  --red:      #f85149;
  --border:   rgba(255,255,255,0.07);
  --border-g: rgba(16,185,129,0.25);
}
html, body { min-height: 100%; background: var(--bg); color: var(--white); font-family: 'Syne', sans-serif; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ──────────────────────────────────────────────────────────────

const LOADING_STEPS = [
  'Searching for institution overview...',
  'Researching private markets allocations...',
  'Identifying fund manager relationships...',
  'Checking regulatory filings...',
  'Reviewing recent fund activity...',
  'Analysing risk profile...',
  'Identifying key contacts...',
  'Searching for warm entry points...',
  'Calculating Proof fit score...',
  'Preparing briefing document...',
];

const FIT_COLORS = {
  'Strong Fit':   '#10b981',
  'Good Fit':     '#58a6ff',
  'Moderate Fit': '#f0a500',
  'Weak Fit':     '#f85149',
};

const SEVERITY_COLORS = {
  high:   '#f85149',
  medium: '#f0a500',
  low:    '#58a6ff',
};

// ── Shared styles ──────────────────────────────────────────────────────────

const S = {
  topbar: {
    height: 60, background: '#161b22',
    borderBottom: '1px solid rgba(255,255,255,0.07)',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 28px', position: 'sticky', top: 0, zIndex: 100,
  },
  logo: { display: 'flex', alignItems: 'center', gap: 12 },
  logoMark: {
    width: 32, height: 32, background: '#10b981', borderRadius: 8,
    display: 'grid', placeItems: 'center', flexShrink: 0,
  },
  logoName: { fontSize: 15, fontWeight: 800, letterSpacing: -0.4, color: '#fff' },
  logoSub: { fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#6e7681', marginLeft: 4 },
  pill: {
    fontFamily: "'DM Mono', monospace", fontSize: 10, padding: '4px 13px',
    borderRadius: 100, border: '1px solid rgba(16,185,129,0.3)', color: '#10b981', letterSpacing: 0.5,
  },
  card: {
    background: '#161b22', border: '1px solid rgba(255,255,255,0.07)',
    borderRadius: 12, padding: '18px 20px',
  },
  sectionLabel: {
    fontFamily: "'DM Mono', monospace", fontSize: 9, fontWeight: 500,
    letterSpacing: 1.6, textTransform: 'uppercase', color: '#6e7681',
    marginBottom: 12,
  },
};

// ── TopBar ─────────────────────────────────────────────────────────────────

function TopBar({ onNew, showNew, page, setPage }) {
  return (
    <div style={S.topbar}>
      <div style={S.logo}>
        <div style={S.logoMark}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6.5" stroke="#000" strokeWidth="1.5"/>
            <path d="M8 4.5v4M8 10v1.5" stroke="#000" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </div>
        <span style={S.logoName}>Proof</span>
        <span style={S.logoSub}>/ lp intelligence</span>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#0d1117', borderRadius: 8, padding: 4 }}>
        {['research', 'generator'].map(p => (
          <button key={p} onClick={() => { setPage(p); if (p === 'research') onNew(); }} style={{
            padding: '6px 16px', borderRadius: 6, border: 'none', cursor: 'pointer',
            fontFamily: "'Syne', sans-serif", fontSize: 12, fontWeight: 600,
            background: page === p ? '#1e242c' : 'transparent',
            color: page === p ? '#e6edf3' : '#6e7681',
            transition: 'all 0.15s',
          }}>
            {p === 'research' ? 'Research' : 'Generate Targets'}
          </button>
        ))}
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        {showNew && page === 'research' && (
          <button onClick={onNew} style={{
            padding: '7px 16px', background: 'transparent', border: '1px solid rgba(255,255,255,0.12)',
            borderRadius: 8, color: '#8b949e', fontFamily: "'Syne', sans-serif", fontSize: 12,
            fontWeight: 600, cursor: 'pointer',
          }}>← New Search</button>
        )}
        <span style={S.pill}>PROOF PRIVATE MARKETS</span>
      </div>
    </div>
  );
}

// ── SearchView ─────────────────────────────────────────────────────────────

function SearchView({ onSearch }) {
  const [q, setQ] = useState('');
  const [saved, setSaved] = useState([]);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const loadSaved = async () => {
    try {
      const res = await fetch('/api/briefings');
      const data = await res.json();
      if (data.ok) setSaved(data.briefings || []);
    } catch {}
  };

  useEffect(() => { loadSaved(); }, []);

  const deleteSaved = async (key, e) => {
    e.stopPropagation();
    if (!confirm('Delete this saved briefing?')) return;
    await fetch(`/api/briefings/${encodeURIComponent(key)}`, { method: 'DELETE' });
    loadSaved();
  };

  const submit = () => { if (q.trim()) onSearch(q.trim()); };

  const examples = [
    'Teacher Retirement System of Texas',
    'Oxford University Endowment',
    'APG Asset Management',
    'Hamilton Lane',
    'Future Fund Australia',
  ];

  const fmtAgo = (iso) => {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const d = Math.floor(diff / 86400000);
    if (d === 0) return 'today';
    if (d === 1) return 'yesterday';
    if (d < 30) return `${d}d ago`;
    const m = Math.floor(d / 30);
    return `${m}mo ago`;
  };

  return (
    <div style={{
      minHeight: 'calc(100vh - 60px)',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      padding: '40px 24px',
    }}>
      <div style={{ maxWidth: 620, width: '100%' }}>
        <div style={{ textAlign: 'center', marginBottom: 40 }}>
          <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", color: '#10b981', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 16 }}>LP Intelligence</div>
          <h1 style={{ fontSize: 34, fontWeight: 800, letterSpacing: -0.8, color: '#fff', lineHeight: 1.2, marginBottom: 12 }}>
            Research any LP<br/>before you reach out
          </h1>
          <p style={{ fontSize: 14, color: '#6e7681', lineHeight: 1.7 }}>
            Enter an institution name or website. Proof researches their portfolio,<br/>
            risk profile, key contacts, and fit for Proof's platform.
          </p>
        </div>

        <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && submit()}
            placeholder="e.g. Teacher Retirement System of Texas"
            style={{
              flex: 1, background: '#1e242c', border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 10, color: '#e6edf3', fontFamily: "'Syne', sans-serif",
              fontSize: 14, padding: '14px 18px', outline: 'none',
              transition: 'border-color 0.15s',
            }}
            onFocus={e => e.target.style.borderColor = 'rgba(16,185,129,0.4)'}
            onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,0.1)'}
          />
          <button
            onClick={submit}
            disabled={!q.trim()}
            style={{
              padding: '14px 24px', background: q.trim() ? '#10b981' : '#1e242c',
              color: q.trim() ? '#000' : '#484f58',
              border: '1px solid ' + (q.trim() ? '#10b981' : 'rgba(255,255,255,0.07)'),
              borderRadius: 10, fontFamily: "'Syne', sans-serif", fontSize: 13,
              fontWeight: 800, cursor: q.trim() ? 'pointer' : 'not-allowed',
              transition: 'all 0.15s', whiteSpace: 'nowrap',
            }}
          >
            Research →
          </button>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#484f58', letterSpacing: 0.5 }}>TRY:</span>
          {examples.map(ex => (
            <button key={ex} onClick={() => onSearch(ex)} style={{
              background: 'transparent', border: '1px solid rgba(255,255,255,0.08)',
              borderRadius: 100, color: '#6e7681', fontFamily: "'Syne', sans-serif",
              fontSize: 11, padding: '4px 12px', cursor: 'pointer', transition: 'all 0.15s',
            }}
            onMouseEnter={e => { e.target.style.borderColor = 'rgba(16,185,129,0.3)'; e.target.style.color = '#10b981'; }}
            onMouseLeave={e => { e.target.style.borderColor = 'rgba(255,255,255,0.08)'; e.target.style.color = '#6e7681'; }}
            >
              {ex}
            </button>
          ))}
        </div>

        {saved.length > 0 && (
          <div style={{ marginTop: 40 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 1.4, textTransform: 'uppercase', color: '#6e7681', marginBottom: 12 }}>
              Saved Briefings · {saved.length}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 8 }}>
              {saved.map(s => (
                <div key={s.key} onClick={() => onSearch(s.query)} style={{
                  background: '#161b22', border: '1px solid rgba(255,255,255,0.07)',
                  borderRadius: 10, padding: '12px 14px', cursor: 'pointer',
                  display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8,
                  transition: 'border-color 0.15s, background 0.15s',
                }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(16,185,129,0.3)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,0.07)'}
                >
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: '#e6edf3', lineHeight: 1.3, marginBottom: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.name}</div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#6e7681' }}>
                      {[s.aum, s.hq, fmtAgo(s.researched_at)].filter(Boolean).join(' · ')}
                    </div>
                  </div>
                  <button onClick={(e) => deleteSaved(s.key, e)} title="Delete" style={{
                    background: 'transparent', border: 'none', color: '#484f58',
                    fontSize: 14, cursor: 'pointer', padding: 2, lineHeight: 1,
                  }}>×</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LoadingView ────────────────────────────────────────────────────────────

function LoadingView({ query }) {
  const [step, setStep] = useState(0);

  useEffect(() => {
    const id = setInterval(() => setStep(s => (s + 1) % LOADING_STEPS.length), 2800);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{
      minHeight: 'calc(100vh - 60px)',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 28,
    }}>
      <div style={{ position: 'relative', width: 56, height: 56 }}>
        <div style={{
          width: 56, height: 56, borderRadius: '50%',
          border: '2px solid #1e242c', borderTopColor: '#10b981',
          animation: 'spin 0.75s linear infinite',
        }}/>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: '#fff', marginBottom: 6 }}>
          Researching {query}
        </div>
        <div style={{
          fontFamily: "'DM Mono', monospace", fontSize: 11, color: '#6e7681',
          minHeight: 18, transition: 'opacity 0.3s',
        }}>
          {LOADING_STEPS[step]}
        </div>
      </div>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#484f58' }}>
        This typically takes 30–60 seconds
      </div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

// ── BriefingView ───────────────────────────────────────────────────────────

const ESG_COLORS = {
  'ESG Leader':    '#10b981',
  'ESG Active':    '#58a6ff',
  'ESG Developing':'#f0a500',
  'ESG Minimal':   '#6e7681',
};

function ScoreBadge({ label, score, rating, color }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#1e242c', border: `1px solid ${color}33`,
      borderRadius: 12, padding: '14px 20px', minWidth: 110,
    }}>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 1.4, textTransform: 'uppercase', color: '#6e7681', marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 36, fontWeight: 800, color, lineHeight: 1, marginBottom: 4 }}>{score}</div>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color, textAlign: 'center' }}>{rating}</div>
    </div>
  );
}

function FitBadge({ score, rating }) {
  const color = FIT_COLORS[rating] || '#10b981';
  return <ScoreBadge label="Proof Fit" score={score} rating={rating} color={color} />;
}

function Tag({ children, color }) {
  return (
    <span style={{
      fontFamily: "'DM Mono', monospace", fontSize: 10, padding: '3px 10px',
      borderRadius: 100, border: `1px solid ${color || 'rgba(255,255,255,0.1)'}`,
      color: color || '#8b949e', background: color ? color + '14' : 'transparent',
      whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function SectionCard({ label, children, style }) {
  return (
    <div style={{ ...S.card, ...style }}>
      <div style={S.sectionLabel}>{label}</div>
      {children}
    </div>
  );
}

function InstitutionHeader({ institution, fit, esg }) {
  return (
    <div style={{ ...S.card, marginBottom: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 1.6, textTransform: 'uppercase', color: '#10b981', marginBottom: 8 }}>LP Briefing</div>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: '#fff', letterSpacing: -0.5, lineHeight: 1.2, marginBottom: 12 }}>{institution.name}</h2>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 }}>
            <Tag color="#10b981">{institution.type}</Tag>
            <Tag>{institution.aum} AUM</Tag>
            <Tag>{institution.hq}</Tag>
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#6e7681' }}>Private Markets:</span>
            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#e6edf3', fontWeight: 500 }}>{institution.private_markets_allocation}</span>
          </div>
          {institution.investment_focus && (
            <div style={{ marginTop: 10, fontSize: 12, color: '#8b949e', lineHeight: 1.65 }}>
              {institution.investment_focus}
            </div>
          )}
        </div>
        <div style={{ display: 'flex', gap: 10, flexShrink: 0 }}>
          {esg && <ScoreBadge label="ESG Score" score={esg.score} rating={esg.rating} color={ESG_COLORS[esg.rating] || '#58a6ff'} />}
          <FitBadge score={fit.score} rating={fit.rating} />
        </div>
      </div>
    </div>
  );
}

function FundExposures({ items }) {
  if (!items?.length) return <div style={{ color: '#484f58', fontSize: 12 }}>No fund exposures identified</div>;
  const byStrategy = items.reduce((acc, f) => {
    if (!acc[f.strategy]) acc[f.strategy] = [];
    acc[f.strategy].push(f);
    return acc;
  }, {});

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {Object.entries(byStrategy).map(([strategy, funds]) => (
        <div key={strategy}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#10b981', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 7 }}>{strategy}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
            {funds.map((f, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                <span style={{ color: '#10b981', fontSize: 12, flexShrink: 0, lineHeight: '18px' }}>›</span>
                <div>
                  <span style={{ fontSize: 12, fontWeight: 700, color: '#e6edf3' }}>{f.manager}</span>
                  {f.notes && <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#6e7681', marginLeft: 8 }}>{f.notes}</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function RegulatorySection({ regulatory }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#6e7681', marginBottom: 4 }}>JURISDICTION</div>
        <Tag color="#58a6ff">{regulatory.jurisdiction}</Tag>
      </div>
      {regulatory.registration && (
        <div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#6e7681', marginBottom: 4 }}>REGISTRATION</div>
          <div style={{ fontSize: 12, color: '#8b949e', lineHeight: 1.6 }}>{regulatory.registration}</div>
        </div>
      )}
      {regulatory.compliance_notes && (
        <div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#6e7681', marginBottom: 4 }}>CONTEXT</div>
          <div style={{ fontSize: 12, color: '#8b949e', lineHeight: 1.6 }}>{regulatory.compliance_notes}</div>
        </div>
      )}
    </div>
  );
}

function RecentActivity({ items }) {
  if (!items?.length) return <div style={{ color: '#484f58', fontSize: 12 }}>No recent activity identified</div>;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {items.map((item, i) => (
        <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#10b981', flexShrink: 0, paddingTop: 1, minWidth: 72 }}>{item.date}</div>
          <div style={{ fontSize: 12, color: '#8b949e', lineHeight: 1.6 }}>{item.event}</div>
        </div>
      ))}
    </div>
  );
}

function RiskFlags({ flags }) {
  if (!flags?.length) return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#10b981' }}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#10b981" strokeWidth="1.2"/><path d="M4.5 7l2 2 3-3" stroke="#10b981" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11 }}>No flags identified</span>
    </div>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {flags.map((f, i) => {
        const color = SEVERITY_COLORS[f.severity] || '#6e7681';
        return (
          <div key={i} style={{ background: '#0d1117', borderRadius: 8, padding: '10px 12px', border: `1px solid ${color}22` }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: f.source ? 4 : 0 }}>
              <div style={{ fontSize: 12, color: '#e6edf3', lineHeight: 1.55 }}>{f.flag}</div>
              <span style={{
                fontFamily: "'DM Mono', monospace", fontSize: 9, padding: '2px 8px', borderRadius: 100,
                background: color + '18', color, border: `1px solid ${color}33`,
                textTransform: 'uppercase', flexShrink: 0,
              }}>{f.severity}</span>
            </div>
            {f.source && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#484f58' }}>{f.source}</div>}
          </div>
        );
      })}
    </div>
  );
}

function KeyContacts({ contacts }) {
  if (!contacts?.length) return <div style={{ color: '#484f58', fontSize: 12 }}>No contacts identified</div>;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {contacts.map((c, i) => (
        <div key={i} style={{ background: '#0d1117', borderRadius: 8, padding: '10px 12px' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#e6edf3', marginBottom: 2 }}>
            {c.name}
            {c.linkedin && (
              <a href={c.linkedin} target="_blank" rel="noopener noreferrer" style={{ marginLeft: 8, fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#58a6ff', verticalAlign: 'middle' }}>LinkedIn ↗</a>
            )}
          </div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#10b981' }}>{c.title}</div>
        </div>
      ))}
    </div>
  );
}

function WarmEntryPoints({ points }) {
  if (!points?.length) return <div style={{ color: '#484f58', fontSize: 12 }}>No entry points identified</div>;
  const typeColors = {
    interview: '#10b981', conference: '#58a6ff', article: '#f0a500',
    report: '#8b949e', 'linkedin post': '#0a66c2',
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {points.map((p, i) => {
        const color = typeColors[p.type?.toLowerCase()] || '#6e7681';
        return (
          <div key={i} style={{ background: '#0d1117', borderRadius: 8, padding: '10px 12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
              <span style={{
                fontFamily: "'DM Mono', monospace", fontSize: 9, padding: '2px 8px',
                borderRadius: 100, background: color + '18', color, border: `1px solid ${color}33`,
                textTransform: 'uppercase',
              }}>{p.type}</span>
              {p.url && (
                <a href={p.url} target="_blank" rel="noopener noreferrer" style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#58a6ff' }}>↗</a>

            <div style={{ fontSize: 12, color: '#8b949e', lineHeight: 1.6 }}>{p.description}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── Generator Page ─────────────────────────────────────────────────────────

const INST_TYPES = ['Pension Fund', 'Endowment', 'Family Office', 'Sovereign Wealth Fund', 'Insurance Company', 'Development Finance'];
const GEOGRAPHIES = ['Global', 'North America', 'Europe', 'United Kingdom', 'Asia Pacific', 'Middle East & Africa', 'Latin America'];
const AUM_RANGES  = ['Any', '$500M – $2B', '$2B – $10B', '$10B – $50B', '$50B+'];
const STRATEGIES  = ['PE', 'VC', 'Infrastructure', 'Private Credit', 'Real Assets'];
const COUNTS      = [10, 15, 20, 30];

function MultiToggle({ options, selected, onChange, color }) {
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {options.map(opt => {
        const active = selected.includes(opt);
        return (
          <button key={opt} onClick={() => onChange(active ? selected.filter(s => s !== opt) : [...selected, opt])} style={{
            padding: '6px 14px', borderRadius: 100, border: `1px solid ${active ? (color || '#10b981') + '60' : 'rgba(255,255,255,0.1)'}`,
            background: active ? (color || '#10b981') + '14' : 'transparent',
            color: active ? (color || '#10b981') : '#6e7681',
            fontFamily: "'Syne', sans-serif", fontSize: 12, fontWeight: 600,
            cursor: 'pointer', transition: 'all 0.15s',
          }}>{opt}</button>
        );
      })}
    </div>
  );
}

function SingleToggle({ options, selected, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {options.map(opt => {
        const active = selected === opt;
        return (
          <button key={opt} onClick={() => onChange(opt)} style={{
            padding: '6px 14px', borderRadius: 100,
            border: `1px solid ${active ? 'rgba(88,166,255,0.5)' : 'rgba(255,255,255,0.1)'}`,
            background: active ? 'rgba(88,166,255,0.12)' : 'transparent',
            color: active ? '#58a6ff' : '#6e7681',
            fontFamily: "'Syne', sans-serif", fontSize: 12, fontWeight: 600,
            cursor: 'pointer', transition: 'all 0.15s',
          }}>{opt}</button>
        );
      })}
    </div>
  );
}

function GeneratorPage({ onSelectLP }) {
  const [instTypes,  setInstTypes]  = useState([]);
  const [geography,  setGeography]  = useState('Global');
  const [aumRange,   setAumRange]   = useState('Any');
  const [strategies, setStrategies] = useState([]);
  const [count,      setCount]      = useState(15);
  const [loading,    setLoading]    = useState(false);
  const [targets,    setTargets]    = useState([]);
  const [error,      setError]      = useState('');

  const generate = async () => {
    setLoading(true); setTargets([]); setError('');
    try {
      const res = await fetch('/api/generate-targets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ institution_types: instTypes, geography, aum_range: aumRange, strategy_focus: strategies, count }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      setTargets(data.targets || []);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const STRATEGY_COLORS = { PE: '#10b981', VC: '#58a6ff', Infrastructure: '#f0a500', 'Private Credit': '#a78bfa', 'Real Assets': '#fb923c' };

  return (
    <div style={{ maxWidth: 1100, margin: '0 auto', padding: '32px 24px 60px' }}>
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 1.6, textTransform: 'uppercase', color: '#10b981', marginBottom: 10 }}>Target Generator</div>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: '#fff', letterSpacing: -0.4, marginBottom: 6 }}>Generate LP Target List</h2>
        <p style={{ fontSize: 13, color: '#6e7681', lineHeight: 1.65 }}>Set your criteria, generate targets, then click Research on any LP to build a full briefing.</p>
      </div>

      {/* Criteria form */}
      <div style={{ ...S.card, marginBottom: 24, display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div>
          <div style={{ ...S.sectionLabel, marginBottom: 10 }}>Institution Type</div>
          <MultiToggle options={INST_TYPES} selected={instTypes} onChange={setInstTypes} color="#10b981" />
          {instTypes.length === 0 && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#484f58', marginTop: 6 }}>All types</div>}
        </div>
        <div>
          <div style={{ ...S.sectionLabel, marginBottom: 10 }}>Geography</div>
          <SingleToggle options={GEOGRAPHIES} selected={geography} onChange={setGeography} />
        </div>
        <div>
          <div style={{ ...S.sectionLabel, marginBottom: 10 }}>AUM Range</div>
          <SingleToggle options={AUM_RANGES} selected={aumRange} onChange={setAumRange} />
        </div>
        <div>
          <div style={{ ...S.sectionLabel, marginBottom: 10 }}>Private Markets Strategy Focus</div>
          <MultiToggle options={STRATEGIES} selected={strategies} onChange={setStrategies} color="#58a6ff" />
          {strategies.length === 0 && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#484f58', marginTop: 6 }}>All strategies</div>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
          <div>
            <div style={{ ...S.sectionLabel, marginBottom: 10 }}>Number of Targets</div>
            <SingleToggle options={COUNTS.map(String)} selected={String(count)} onChange={v => setCount(Number(v))} />
          </div>
          <button onClick={generate} disabled={loading} style={{
            padding: '13px 32px', background: loading ? '#1e242c' : '#10b981',
            color: loading ? '#484f58' : '#000', border: 'none', borderRadius: 10,
            fontFamily: "'Syne', sans-serif", fontSize: 13, fontWeight: 800,
            cursor: loading ? 'not-allowed' : 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap',
          }}>
            {loading ? 'Generating...' : 'Generate Targets →'}
          </button>
        </div>
      </div>

      {loading && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '24px 0', color: '#6e7681' }}>
          <div style={{ width: 20, height: 20, borderRadius: '50%', border: '2px solid #1e242c', borderTopColor: '#10b981', animation: 'spin 0.75s linear infinite' }}/>
          <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11 }}>Building target list...</span>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {error && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: '#f85149', padding: '12px 0' }}>{error}</div>}

      {targets.length > 0 && (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', marginBottom: 14 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 1.4, textTransform: 'uppercase', color: '#6e7681' }}>
              {targets.length} targets
            </div>
          </div>

          {/* Cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 10 }}>
            {targets.map((t, i) => {
              return (
                <div key={i} style={{
                  ...S.card, position: 'relative', transition: 'border-color 0.15s, background 0.15s',
                  borderColor: 'rgba(255,255,255,0.07)', background: '#161b22',
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: '#e6edf3', lineHeight: 1.35, flex: 1 }}>{t.name}</span>
                    <button onClick={() => onSelectLP(t.name)} style={{
                      fontFamily: "'DM Mono', monospace", fontSize: 9, color: '#10b981',
                      background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.2)',
                      borderRadius: 100, padding: '2px 8px', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                    }}>Research →</button>
                  </div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: '#6e7681', marginBottom: 8 }}>
                    {t.type} · {t.location} · {t.aum}
                  </div>
                  {t.strategies?.length > 0 && (
                    <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginBottom: 8 }}>
                      {t.strategies.map(s => (
                        <span key={s} style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, padding: '2px 7px', borderRadius: 100, background: (STRATEGY_COLORS[s] || '#6e7681') + '14', color: STRATEGY_COLORS[s] || '#6e7681', border: `1px solid ${(STRATEGY_COLORS[s] || '#6e7681')}33` }}>{s}</span>
                      ))}
                    </div>
                  )}
                  <div style={{ fontSize: 11, color: '#6e7681', lineHeight: 1.6 }}>{t.why}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage]       = useState('research'); // research | generator
  const [phase, setPhase]     = useState('search');   // search | loading | result | error
  const [query, setQuery]     = useState('');
  const [briefing, setBriefing] = useState(null);
  const [error, setError]     = useState('');

  const handleSearch = async (q) => {
    setQuery(q);
    setPhase('loading');
    setError('');

    try {
      const res = await fetch('/api/research', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Research failed');
      setBriefing(data.briefing);
      setPhase('result');
    } catch (err) {
      setError(err.message);
      setPhase('error');
    }
  };

  const handleNew = () => {
    setPhase('search');
    setBriefing(null);
    setQuery('');
    setError('');
  };

  const handleSelectLP = (name) => {
    setPage('research');
    handleSearch(name);
  };

  return (
    <div>
      <TopBar onNew={handleNew} showNew={phase !== 'search'} page={page} setPage={setPage} />

      {page === 'generator' && <GeneratorPage onSelectLP={handleSelectLP} />}

      {page === 'research' && phase === 'search' && <SearchView onSearch={handleSearch} />}

      {page === 'research' && phase === 'loading' && <LoadingView query={query} />}

      {page === 'research' && phase === 'result' && briefing && (
        <BriefingView briefing={briefing} query={query} />
      )}

      {page === 'research' && phase === 'error' && (
        <div style={{
          minHeight: 'calc(100vh - 60px)', display: 'flex',
          flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16,
        }}>
          <div style={{ fontSize: 13, color: '#f85149', fontFamily: "'DM Mono', monospace" }}>Research failed</div>
          <div style={{ fontSize: 12, color: '#6e7681', maxWidth: 400, textAlign: 'center' }}>{error}</div>
          <button onClick={handleNew} style={{
            marginTop: 8, padding: '10px 20px', background: '#1e242c',
            border: '1px solid rgba(255,255,255,0.12)', borderRadius: 8,
            color: '#8b949e', fontFamily: "'Syne', sans-serif", fontSize: 12,
            fontWeight: 600, cursor: 'pointer',
          }}>Try Again</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
